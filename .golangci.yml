version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - gofmt
    - ineffassign
  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (net.Conn).Close

run:
  timeout: 5m
  exclude-dirs:
    - third_party
    - web/frpc/dist
    - .claude
