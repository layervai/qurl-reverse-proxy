<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QURL Reverse Proxy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e27;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 2rem;
        }
        .logo {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            font-size: 1.1rem;
            color: #8892b0;
            margin-bottom: 2rem;
        }
        .status {
            display: inline-block;
            padding: 0.4rem 1.2rem;
            border-radius: 20px;
            background: rgba(0, 242, 254, 0.1);
            border: 1px solid rgba(0, 242, 254, 0.3);
            color: #00f2fe;
            font-size: 0.9rem;
        }
        .links {
            margin-top: 2rem;
        }
        .links a {
            color: #4facfe;
            text-decoration: none;
            margin: 0 0.5rem;
        }
        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">QURL</div>
        <p class="subtitle">Zero-Trust Reverse Proxy by LayerV</p>
        <div class="status">QURL Proxy Client is running</div>
        <div class="links">
            <a href="https://github.com/layervai/qurl-reverse-proxy">GitHub</a>
            <a href="https://layerv.ai">LayerV</a>
        </div>
    </div>
</body>
</html>
