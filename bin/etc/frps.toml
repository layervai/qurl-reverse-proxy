# Log to file instead of console
log.to = "{{ .Envs.QURL_BIN_DIR }}/logs/qurl-frps.log"
log.level = "info"
log.maxDays = 3

# Port that frps listens on for client connections
bindPort = 7000

# Port for HTTP virtual host proxying
# Clients with type = "http" proxies are accessible via this port
# e.g., http://<subdomain>.ac.opennhp.org:6060
vhostHTTPPort = 6060

# Subdomain host for HTTP vhost routing
# Clients register subdomains under this host (e.g., <machine-id>.ac.opennhp.org)
subDomainHost = "ac.opennhp.org"
