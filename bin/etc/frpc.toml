# FRP server address and port to connect to
serverAddr = "proxy.layerv.ai"
serverPort = 7000

# Log to file instead of console
log.to = "{{ .Envs.QURL_BIN_DIR }}/logs/qurl-frpc.log"
log.level = "info"
log.maxDays = 3

# Authentication method and token for server connection
auth.method = "token"
auth.token = "opennhp-frp"

# Local configuration web dashboard for monitoring proxy status
# Accessible at http://127.0.0.1:7400
# Also exposed via FRP tunnel for remote management by the server
webServer.addr = "127.0.0.1"
webServer.port = 7400
webServer.user = "admin"
webServer.password = "{{ .Envs.QURL_MACHINE_ID }}"

# Proxy: expose local static file server (port 8888) via subdomain
# Subdomain is dynamically set to the machine ID at startup
# Accessible at https://<machine-id>.qurl.site
[[proxies]]
name = "file-server"
type = "http"
localIP = "127.0.0.1"
localPort = 8888
subdomain = "{{ .Envs.QURL_MACHINE_ID }}"

# Proxy: expose admin API for remote config management by the server
# Protected by basic auth (user: admin, password: machine ID)
# Accessible at https://<machine-id>-admin.qurl.site
[[proxies]]
name = "admin-api"
type = "http"
localIP = "127.0.0.1"
localPort = 7400
subdomain = "{{ .Envs.QURL_MACHINE_ID }}-admin"

